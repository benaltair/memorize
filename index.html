<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Memorize</title>
<meta name="description" content="A minimal memorization tool. Enter a quote or passage, then hide words one by one until you can recite it from memory.">
<meta name="author" content="Ben Altair">
<meta name="theme-color" content="#f5f0e8">
<meta property="og:title" content="Memorize">
<meta property="og:description" content="A minimal memorization tool. Hide words one by one until you can recite from memory.">
<meta property="og:type" content="website">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📖</text></svg>">
<style>
  [data-theme="light"] {
    --bg: #f5f0e8;
    --bg-secondary: #ebe5d9;
    --text: #3b3530;
    --text-muted: #8a7e72;
    --accent: #b8a99a;
    --border: #d6cdc0;
    --control-hover: #d6cdc0;
  }

  [data-theme="sepia"] {
    --bg: #f0e6d2;
    --bg-secondary: #e6dac2;
    --text: #44382a;
    --text-muted: #8a7560;
    --accent: #b09878;
    --border: #c9b898;
    --control-hover: #d4c4a8;
  }

  [data-theme="dark"] {
    --bg: #1e1c1a;
    --bg-secondary: #2a2725;
    --text: #e0d8cc;
    --text-muted: #7a7168;
    --accent: #6b6058;
    --border: #3a3632;
    --control-hover: #3a3632;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Georgia', 'Times New Roman', serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100dvh;
    transition: background 0.4s ease, color 0.4s ease;
    overflow: hidden;
  }

  #entry-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100dvh;
    padding: 2rem;
  }

  #entry-screen h1 {
    font-weight: 400;
    font-size: 1.6rem;
    letter-spacing: 0.08em;
    color: var(--text-muted);
    margin-bottom: 2.5rem;
  }

  #quote-input {
    width: 100%;
    max-width: 640px;
    min-height: 200px;
    padding: 1.5rem;
    font-family: 'Georgia', 'Times New Roman', serif;
    font-size: 1.1rem;
    line-height: 1.8;
    color: var(--text);
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: 8px;
    resize: vertical;
    outline: none;
    transition: border-color 0.3s ease, background 0.4s ease, color 0.4s ease;
  }

  #quote-input::placeholder { color: var(--accent); }
  #quote-input:focus { border-color: var(--accent); }

  #begin-btn {
    margin-top: 1.8rem;
    padding: 0.75rem 2.8rem;
    font-family: 'Georgia', 'Times New Roman', serif;
    font-size: 1rem;
    letter-spacing: 0.06em;
    color: var(--text);
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.3s ease;
  }

  #begin-btn:hover { background: var(--bg-secondary); border-color: var(--accent); }
  #begin-btn:disabled { opacity: 0.35; cursor: default; }

  #practice-screen {
    display: none;
    flex-direction: column;
    height: 100dvh;
  }

  .toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1rem 1.5rem;
    flex-shrink: 0;
  }

  .toolbar-left, .toolbar-right {
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .tool-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 38px;
    height: 38px;
    background: transparent;
    border: none;
    border-radius: 6px;
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.2s ease;
  }

  .tool-btn:hover { background: var(--control-hover); color: var(--text); }

  .tool-btn svg {
    width: 20px;
    height: 20px;
    stroke: currentColor;
    fill: none;
    stroke-width: 1.8;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .size-label {
    font-family: 'Georgia', 'Times New Roman', serif;
    font-size: 0.85rem;
    color: var(--text-muted);
    letter-spacing: 0.02em;
    user-select: none;
    width: 28px;
    text-align: center;
  }

  .quote-container {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1rem 3rem 2rem;
    overflow: hidden;
    position: relative;
  }

  .quote-text {
    max-width: 940px;
    line-height: 1.85;
    text-align: center;
    text-wrap: balance;
    user-select: none;
    transition: filter 0.3s ease;
  }

  .word {
    display: inline-block;
    cursor: pointer;
    padding: 0.1em 0.05em;
    border-radius: 3px;
    transition: opacity 0.5s ease, background 0.2s ease;
    position: relative;
  }

  .word:hover:not(.hidden) { background: var(--control-hover); }

  .word.hidden {
    opacity: 0;
    cursor: default;
    pointer-events: none;
  }

  .bottom-bar {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1rem 1.5rem;
    gap: 1rem;
    flex-shrink: 0;
  }

  .bottom-btn {
    padding: 0.5rem 1.4rem;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 0.8rem;
    letter-spacing: 0.04em;
    color: var(--text-muted);
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 5px;
    cursor: pointer;
    transition: all 0.25s ease;
  }

  .bottom-btn:hover {
    color: var(--text);
    border-color: var(--accent);
    background: var(--bg-secondary);
  }

  .counter {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 0.78rem;
    color: var(--text-muted);
    letter-spacing: 0.02em;
    min-width: 80px;
    text-align: center;
  }

  .quote-text.size-1 { font-size: 1.1rem; }
  .quote-text.size-2 { font-size: 1.45rem; }
  .quote-text.size-3 { font-size: 1.85rem; }
  .quote-text.size-4 { font-size: 2.3rem; }
  .quote-text.size-5 { font-size: 2.9rem; }
  .quote-text.size-6 { font-size: 3.5rem; }
  .quote-text.size-7 { font-size: 4.2rem; }

  @media (max-width: 600px) {
    .quote-container { padding: 1rem 1.2rem 1.5rem; }
    .quote-text.size-1 { font-size: 0.95rem; }
    .quote-text.size-2 { font-size: 1.15rem; }
    .quote-text.size-3 { font-size: 1.4rem; }
    .quote-text.size-4 { font-size: 1.7rem; }
    .quote-text.size-5 { font-size: 2.1rem; }
    .quote-text.size-6 { font-size: 2.5rem; }
    .quote-text.size-7 { font-size: 3rem; }
  }

  @keyframes swim {
    0%   { transform: translate(0, 0) rotate(0deg); }
    25%  { transform: translate(3px, -5px) rotate(1.5deg); }
    50%  { transform: translate(-2px, 3px) rotate(-1deg); }
    75%  { transform: translate(4px, 2px) rotate(2deg); }
    100% { transform: translate(0, 0) rotate(0deg); }
  }

  .word.wavy {
    animation: swim var(--swim-dur, 3s) ease-in-out infinite;
    animation-delay: var(--swim-delay, 0s);
  }
</style>
</head>
<body>

<div id="entry-screen">
  <h1>Memorize</h1>
  <textarea id="quote-input" placeholder="Enter a quote or passage to memorize..."></textarea>
  <button id="begin-btn" disabled>Begin</button>
</div>

<div id="practice-screen">
  <div class="toolbar">
    <div class="toolbar-left">
      <button class="tool-btn" id="exit-btn" title="Exit">
        <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="toolbar-right">
      <button class="tool-btn" id="size-down-btn" title="Decrease text size">
        <svg viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </button>
      <span class="size-label" id="size-label">aA</span>
      <button class="tool-btn" id="size-up-btn" title="Increase text size">
        <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </button>
      <button class="tool-btn" id="theme-btn" title="Toggle theme">
        <svg viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
      </button>
    </div>
  </div>

  <div class="quote-container" id="quote-container">
    <div class="quote-text size-3" id="quote-display"></div>
  </div>

  <div class="bottom-bar">
    <button class="bottom-btn" id="reset-btn">Reveal All</button>
    <span class="counter" id="counter"></span>
    <button class="bottom-btn" id="hide-random-btn">Hide Next</button>
  </div>
</div>

<script>
(function() {
  const entryScreen = document.getElementById('entry-screen');
  const practiceScreen = document.getElementById('practice-screen');
  const quoteInput = document.getElementById('quote-input');
  const beginBtn = document.getElementById('begin-btn');
  const exitBtn = document.getElementById('exit-btn');
  const themeBtn = document.getElementById('theme-btn');
  const sizeUpBtn = document.getElementById('size-up-btn');
  const sizeDownBtn = document.getElementById('size-down-btn');
  const sizeLabel = document.getElementById('size-label');
  const quoteDisplay = document.getElementById('quote-display');
  const quoteContainer = document.getElementById('quote-container');
  const resetBtn = document.getElementById('reset-btn');
  const hideRandomBtn = document.getElementById('hide-random-btn');
  const counter = document.getElementById('counter');

  let words = [];
  let hiddenCount = 0;
  let totalWords = 0;
  let currentSize = 3;
  const minSize = 1;
  const maxSize = 7;
  const themes = ['light', 'sepia', 'dark'];
  let themeIndex = 0;

  let effectCleanup = null;

  // Shuffle deck for easter eggs - cycles through all before repeating
  let effectDeck = [];
  const effectFns = [effectGravity, effectWavy, effectLetterDrop, effectTrippy, effectBlur];

  function shuffleArray(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  function nextEffect() {
    if (effectDeck.length === 0) {
      effectDeck = shuffleArray([...effectFns]);
    }
    return effectDeck.pop();
  }

  quoteInput.addEventListener('input', function() {
    beginBtn.disabled = !this.value.trim();
  });

  quoteInput.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && e.metaKey && this.value.trim()) startPractice();
  });

  beginBtn.addEventListener('click', startPractice);
  exitBtn.addEventListener('click', exitPractice);
  themeBtn.addEventListener('click', function(e) {
    if (e.altKey) {
      triggerEasterEgg();
    } else {
      cycleTheme();
    }
  });
  sizeUpBtn.addEventListener('click', () => adjustSize(1));
  sizeDownBtn.addEventListener('click', () => adjustSize(-1));
  resetBtn.addEventListener('click', revealAll);
  hideRandomBtn.addEventListener('click', hideRandom);

  function bestSizeForLength(charCount) {
    if (charCount > 600) return 1;
    if (charCount > 400) return 2;
    if (charCount > 250) return 3;
    if (charCount > 140) return 4;
    if (charCount > 60)  return 5;
    if (charCount > 25)  return 6;
    return 7;
  }

  function startPractice() {
    const text = quoteInput.value.trim();
    if (!text) return;

    cleanupEffect();
    quoteDisplay.innerHTML = '';
    quoteDisplay.style.filter = '';
    words = [];
    hiddenCount = 0;

    const tokens = text.split(/(\s+)/);
    tokens.forEach(token => {
      if (/^\s+$/.test(token)) {
        if (token.includes('\n')) {
          quoteDisplay.appendChild(document.createElement('br'));
        } else {
          quoteDisplay.appendChild(document.createTextNode(' '));
        }
      } else {
        const span = document.createElement('span');
        span.className = 'word';
        span.textContent = token;
        span.addEventListener('click', () => toggleWord(span));
        quoteDisplay.appendChild(span);
        words.push(span);
      }
    });

    totalWords = words.length;
    currentSize = bestSizeForLength(text.length);
    updateCounter();
    applySize();

    entryScreen.style.display = 'none';
    practiceScreen.style.display = 'flex';
  }

  function toggleWord(span) {
    if (span.classList.contains('hidden')) return;
    span.classList.add('hidden');
    hiddenCount++;
    updateCounter();
  }

  function hideRandom() {
    const visible = words.filter(w => !w.classList.contains('hidden'));
    if (visible.length === 0) return;
    const pick = visible[Math.floor(Math.random() * visible.length)];
    pick.classList.add('hidden');
    hiddenCount++;
    updateCounter();
  }

  function revealAll() {
    words.forEach(w => w.classList.remove('hidden'));
    hiddenCount = 0;
    updateCounter();
  }

  function updateCounter() {
    counter.textContent = hiddenCount + ' / ' + totalWords + ' Hidden';
  }

  function exitPractice() {
    cleanupEffect();
    practiceScreen.style.display = 'none';
    entryScreen.style.display = 'flex';
  }

  function cycleTheme() {
    themeIndex = (themeIndex + 1) % themes.length;
    document.documentElement.setAttribute('data-theme', themes[themeIndex]);
  }

  function adjustSize(delta) {
    currentSize = Math.max(minSize, Math.min(maxSize, currentSize + delta));
    applySize();
  }

  function applySize() {
    for (let i = minSize; i <= maxSize; i++) quoteDisplay.classList.remove('size-' + i);
    quoteDisplay.classList.add('size-' + currentSize);
    sizeLabel.textContent = 'aA';
  }

  // ---- Easter Eggs ----

  function cleanupEffect() {
    if (effectCleanup) { effectCleanup(); effectCleanup = null; }
  }

  function triggerEasterEgg() {
    cleanupEffect();
    const fn = nextEffect();
    fn();
  }

  // 1. Gravity: words fall to the bottom with bounce physics
  function effectGravity() {
    const containerRect = quoteContainer.getBoundingClientRect();
    const bodies = [];

    words.forEach((w, i) => {
      const rect = w.getBoundingClientRect();
      bodies.push({
        el: w,
        startY: rect.top,
        floor: containerRect.bottom - rect.height - 8,
        vy: 0,
        y: 0,
        bounce: 0.35 + Math.random() * 0.25,
        settled: false,
        delay: i * 30 + Math.random() * 80,
      });
      w.style.position = 'relative';
    });

    let started = performance.now();
    let rafId;
    const gravity = 1800;
    const dt = 1 / 60;

    function tick(now) {
      const elapsed = now - started;
      let allSettled = true;

      bodies.forEach(p => {
        if (p.settled) return;
        if (elapsed < p.delay) { allSettled = false; return; }
        allSettled = false;
        p.vy += gravity * dt;
        p.y += p.vy * dt;
        const maxY = p.floor - p.startY;
        if (p.y >= maxY) {
          p.y = maxY;
          p.vy = -p.vy * p.bounce;
          if (Math.abs(p.vy) < 15) { p.vy = 0; p.settled = true; }
        }
        p.el.style.transform = 'translateY(' + p.y + 'px)';
      });

      if (!allSettled) rafId = requestAnimationFrame(tick);
    }

    rafId = requestAnimationFrame(tick);

    effectCleanup = function() {
      cancelAnimationFrame(rafId);
      words.forEach(w => { w.style.position = ''; w.style.transform = ''; });
    };
  }

  // 2. Wavy: words swim around
  function effectWavy() {
    words.forEach((w, i) => {
      w.classList.add('wavy');
      const dur = 2.5 + Math.random() * 2.5;
      const delay = Math.random() * dur;
      w.style.setProperty('--swim-dur', dur + 's');
      w.style.setProperty('--swim-delay', '-' + delay + 's');
    });

    effectCleanup = function() {
      words.forEach(w => {
        w.classList.remove('wavy');
        w.style.removeProperty('--swim-dur');
        w.style.removeProperty('--swim-delay');
      });
    };
  }

  // 3. Letter drop: letters detach and fall with pinball-style gravity physics
  function effectLetterDrop() {
    const containerRect = quoteContainer.getBoundingClientRect();
    const allLetters = [];

    words.forEach(w => {
      const text = w.textContent;
      w.textContent = '';
      for (let i = 0; i < text.length; i++) {
        const ls = document.createElement('span');
        ls.textContent = text[i];
        ls.style.display = 'inline-block';
        ls.style.position = 'relative';
        w.appendChild(ls);
        allLetters.push({ el: ls, word: w, detached: false });
      }
    });

    let remaining = [...allLetters];
    let interval = 600;
    let timerId;
    let rafId;
    const gravity = 2200;
    const dt = 1 / 60;
    const falling = [];

    function detachOne() {
      if (remaining.length === 0) return;
      const idx = Math.floor(Math.random() * remaining.length);
      const letter = remaining.splice(idx, 1)[0];
      letter.detached = true;

      const rect = letter.el.getBoundingClientRect();
      const floor = containerRect.bottom - rect.height - 4;

      falling.push({
        el: letter.el,
        y: 0,
        startY: rect.top,
        floor: floor,
        vy: -(50 + Math.random() * 100),
        vx: (Math.random() - 0.5) * 120,
        x: 0,
        bounce: 0.25 + Math.random() * 0.3,
        friction: 0.92 + Math.random() * 0.06,
        settled: false,
        opacity: 1,
      });

      interval = Math.max(25, interval * 0.87);
      if (remaining.length > 0) timerId = setTimeout(detachOne, interval);
    }

    function tick() {
      let anyActive = false;

      falling.forEach(p => {
        if (p.settled) return;
        anyActive = true;

        p.vy += gravity * dt;
        p.y += p.vy * dt;
        p.x += p.vx * dt;
        p.vx *= p.friction;

        const maxY = p.floor - p.startY;
        if (p.y >= maxY) {
          p.y = maxY;
          p.vy = -p.vy * p.bounce;
          p.vx *= 0.8;
          if (Math.abs(p.vy) < 12 && p.y >= maxY - 1) {
            p.vy = 0;
            p.settled = true;
            p.opacity = 0;
          }
        }

        p.el.style.transform = 'translate(' + p.x.toFixed(1) + 'px,' + p.y.toFixed(1) + 'px)';
        if (p.settled) p.el.style.opacity = '0';
      });

      if (anyActive || remaining.length > 0) rafId = requestAnimationFrame(tick);
    }

    timerId = setTimeout(detachOne, interval);
    rafId = requestAnimationFrame(tick);

    effectCleanup = function() {
      clearTimeout(timerId);
      cancelAnimationFrame(rafId);
      words.forEach(w => {
        const text = Array.from(w.querySelectorAll('span')).map(s => s.textContent).join('');
        w.textContent = text;
      });
    };
  }

  // 4. Trippy: rainbow hue cycling
  function effectTrippy() {
    let hue = 0;
    let rafId;

    words.forEach((w, i) => {
      w._hueOffset = (i / words.length) * 360;
    });

    function tick() {
      hue = (hue + 1.5) % 360;
      words.forEach(w => {
        const h = (hue + w._hueOffset) % 360;
        w.style.color = 'hsl(' + h + ', 75%, 55%)';
      });
      rafId = requestAnimationFrame(tick);
    }

    rafId = requestAnimationFrame(tick);

    effectCleanup = function() {
      cancelAnimationFrame(rafId);
      words.forEach(w => { w.style.color = ''; delete w._hueOffset; });
    };
  }

  // 5. Blur: progressive gaussian blur
  function effectBlur() {
    let blur = 0;
    let intervalId = setInterval(() => {
      blur += 0.12;
      quoteDisplay.style.filter = 'blur(' + blur + 'px)';
      if (blur > 20) clearInterval(intervalId);
    }, 50);

    effectCleanup = function() {
      clearInterval(intervalId);
      quoteDisplay.style.filter = '';
    };
  }

})();
</script>
</body>
</html>
