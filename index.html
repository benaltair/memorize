<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Memorize</title>
<meta name="description" content="A minimal memorization tool. Enter a quote or passage, then hide words one by one until you can recite it from memory.">
<meta name="author" content="Ben Altair">
<meta name="theme-color" content="#f5f0e8">
<meta property="og:title" content="Memorize">
<meta property="og:description" content="A minimal memorization tool. Hide words one by one until you can recite from memory.">
<meta property="og:type" content="website">
<meta property="og:site_name" content="Memorize">
<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="Memorize">
<meta name="twitter:description" content="A minimal memorization tool. Hide words one by one until you can recite from memory.">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📖</text></svg>">
<style>
  [data-theme="light"] {
    --bg: #f5f0e8;
    --bg-secondary: #ebe5d9;
    --text: #3b3530;
    --text-muted: #8a7e72;
    --accent: #b8a99a;
    --border: #d6cdc0;
    --control-hover: #d6cdc0;
  }

  [data-theme="sepia"] {
    --bg: #f0e6d2;
    --bg-secondary: #e6dac2;
    --text: #44382a;
    --text-muted: #8a7560;
    --accent: #b09878;
    --border: #c9b898;
    --control-hover: #d4c4a8;
  }

  [data-theme="dark"] {
    --bg: #1e1c1a;
    --bg-secondary: #2a2725;
    --text: #e0d8cc;
    --text-muted: #7a7168;
    --accent: #6b6058;
    --border: #3a3632;
    --control-hover: #3a3632;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Georgia', 'Times New Roman', serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100dvh;
    transition: background 0.4s ease, color 0.4s ease;
    overflow: hidden;
  }

  /* ---- Entry Screen ---- */
  #entry-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100dvh;
    padding: 2rem;
  }

  #entry-screen h1 {
    font-weight: 400;
    font-size: 1.6rem;
    letter-spacing: 0.08em;
    color: var(--text-muted);
    margin-bottom: 1.2rem;
  }

  .app-description {
    max-width: 520px;
    text-align: center;
    font-size: 0.92rem;
    line-height: 1.7;
    color: var(--text-muted);
    margin-bottom: 2.2rem;
    font-style: italic;
  }

  #quote-input {
    width: 100%;
    max-width: 640px;
    min-height: 180px;
    padding: 1.5rem;
    font-family: 'Georgia', 'Times New Roman', serif;
    font-size: 1.1rem;
    line-height: 1.8;
    color: var(--text);
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: 8px;
    resize: vertical;
    outline: none;
    transition: border-color 0.3s ease, background 0.4s ease, color 0.4s ease;
  }

  #quote-input::placeholder { color: var(--accent); }
  #quote-input:focus { border-color: var(--accent); }

  .entry-buttons {
    display: flex;
    align-items: center;
    gap: 1.2rem;
    margin-top: 1.8rem;
  }

  .text-btn {
    font-family: 'Georgia', 'Times New Roman', serif;
    font-size: 0.95rem;
    letter-spacing: 0.04em;
    color: var(--text-muted);
    background: transparent;
    border: none;
    cursor: pointer;
    padding: 0.5rem 0.2rem;
    transition: color 0.25s ease;
  }

  .text-btn:hover { color: var(--text); }
  .text-btn:disabled { opacity: 0.35; cursor: default; }

  #begin-btn {
    padding: 0.75rem 2.8rem;
    font-family: 'Georgia', 'Times New Roman', serif;
    font-size: 1rem;
    letter-spacing: 0.06em;
    color: var(--text);
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.3s ease;
  }

  #begin-btn:hover { background: var(--bg-secondary); border-color: var(--accent); }
  #begin-btn:disabled { opacity: 0.35; cursor: default; }

  /* ---- Practice Screen ---- */
  #practice-screen {
    display: none;
    flex-direction: column;
    height: 100dvh;
  }

  .toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1rem 1.5rem;
    flex-shrink: 0;
  }

  .toolbar-left, .toolbar-right {
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .tool-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 38px;
    height: 38px;
    background: transparent;
    border: none;
    border-radius: 6px;
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.2s ease;
  }

  .tool-btn:hover { background: var(--control-hover); color: var(--text); }

  .tool-btn svg {
    width: 20px;
    height: 20px;
    stroke: currentColor;
    fill: none;
    stroke-width: 1.8;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .size-label {
    font-family: 'Georgia', 'Times New Roman', serif;
    font-size: 0.85rem;
    color: var(--text-muted);
    letter-spacing: 0.02em;
    user-select: none;
    width: 28px;
    text-align: center;
  }

  .quote-container {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1rem 3rem 2rem;
    overflow: hidden;
    position: relative;
  }

  .quote-text {
    max-width: 940px;
    line-height: 1.85;
    text-align: center;
    text-wrap: balance;
    user-select: none;
    transition: filter 0.3s ease;
  }

  .word {
    display: inline-block;
    cursor: pointer;
    padding: 0.1em 0.05em;
    border-radius: 3px;
    transition: opacity 0.5s ease, background 0.2s ease;
    position: relative;
  }

  .word:hover:not(.hidden) { background: var(--control-hover); }

  .word.hidden {
    opacity: 0;
    cursor: default;
    pointer-events: none;
  }

  .bottom-bar {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1rem 1.5rem;
    gap: 1rem;
    flex-shrink: 0;
  }

  .bottom-btn {
    padding: 0.5rem 1.4rem;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 0.8rem;
    letter-spacing: 0.04em;
    color: var(--text-muted);
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 5px;
    cursor: pointer;
    transition: all 0.25s ease;
  }

  .bottom-btn:hover {
    color: var(--text);
    border-color: var(--accent);
    background: var(--bg-secondary);
  }

  .counter {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 0.78rem;
    color: var(--text-muted);
    letter-spacing: 0.02em;
    min-width: 80px;
    text-align: center;
  }

  /* Share toast */
  .toast {
    position: fixed;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--bg-secondary);
    color: var(--text-muted);
    border: 1px solid var(--border);
    padding: 0.6rem 1.4rem;
    border-radius: 6px;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 0.82rem;
    opacity: 0;
    transition: opacity 0.3s ease, transform 0.3s ease;
    pointer-events: none;
    z-index: 100;
  }

  .toast.visible {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* ---- Font sizes ---- */
  .quote-text.size-1 { font-size: 1.1rem; }
  .quote-text.size-2 { font-size: 1.45rem; }
  .quote-text.size-3 { font-size: 1.85rem; }
  .quote-text.size-4 { font-size: 2.3rem; }
  .quote-text.size-5 { font-size: 2.9rem; }
  .quote-text.size-6 { font-size: 3.5rem; }
  .quote-text.size-7 { font-size: 4.2rem; }

  /* ---- Responsive: mobile ---- */
  @media (max-width: 600px) {
    #entry-screen { padding: 1.5rem 1.2rem; }
    .app-description { font-size: 0.84rem; margin-bottom: 1.6rem; }
    #quote-input { min-height: 150px; padding: 1.2rem; font-size: 1rem; }
    .entry-buttons { gap: 0.8rem; }
    #begin-btn { padding: 0.65rem 2rem; font-size: 0.95rem; }
    .quote-container { padding: 0.8rem 1rem 1.2rem; }
    .toolbar { padding: 0.7rem 1rem; }
    .bottom-bar { padding: 0.7rem 1rem; gap: 0.6rem; }
    .bottom-btn { padding: 0.4rem 1rem; font-size: 0.75rem; }
    .quote-text.size-1 { font-size: 0.95rem; }
    .quote-text.size-2 { font-size: 1.15rem; }
    .quote-text.size-3 { font-size: 1.4rem; }
    .quote-text.size-4 { font-size: 1.7rem; }
    .quote-text.size-5 { font-size: 2.1rem; }
    .quote-text.size-6 { font-size: 2.5rem; }
    .quote-text.size-7 { font-size: 3rem; }
  }

  /* ---- Responsive: iPad / tablet ---- */
  @media (min-width: 601px) and (max-width: 1024px) {
    .quote-container { padding: 1rem 2rem 1.5rem; }
    .quote-text { max-width: 780px; }
  }

  /* ---- Responsive: large desktop / TV cast ---- */
  @media (min-width: 1400px) {
    .quote-text { max-width: 1100px; }
    .quote-text.size-1 { font-size: 1.3rem; }
    .quote-text.size-2 { font-size: 1.7rem; }
    .quote-text.size-3 { font-size: 2.2rem; }
    .quote-text.size-4 { font-size: 2.8rem; }
    .quote-text.size-5 { font-size: 3.5rem; }
    .quote-text.size-6 { font-size: 4.2rem; }
    .quote-text.size-7 { font-size: 5rem; }
    .toolbar { padding: 1.2rem 2.5rem; }
    .bottom-bar { padding: 1.2rem 2.5rem; }
    .tool-btn { width: 44px; height: 44px; }
    .tool-btn svg { width: 24px; height: 24px; }
    .bottom-btn { padding: 0.6rem 1.8rem; font-size: 0.9rem; }
    .counter { font-size: 0.88rem; }
  }

  @keyframes swim {
    0%   { transform: translate(0, 0) rotate(0deg); }
    25%  { transform: translate(3px, -5px) rotate(1.5deg); }
    50%  { transform: translate(-2px, 3px) rotate(-1deg); }
    75%  { transform: translate(4px, 2px) rotate(2deg); }
    100% { transform: translate(0, 0) rotate(0deg); }
  }

  .word.wavy {
    animation: swim var(--swim-dur, 3s) ease-in-out infinite;
    animation-delay: var(--swim-delay, 0s);
  }
</style>
</head>
<body>

<div id="entry-screen">
  <h1>Memorize</h1>
  <p class="app-description">
    Enter a quote or passage, then tap on words to hide them one by one.
    Read the passage aloud each round, filling in the gaps from memory.
    Repeat until every word is gone and you can recite it by heart -- alone or as a group.
  </p>
  <textarea id="quote-input" placeholder="Enter a quote or passage to memorize..."></textarea>
  <div class="entry-buttons">
    <button class="text-btn" id="example-btn" title="Enter an example quote">Example</button>
    <button id="begin-btn" disabled>Begin</button>
  </div>
</div>

<div id="practice-screen">
  <div class="toolbar">
    <div class="toolbar-left">
      <button class="tool-btn" id="exit-btn" title="Exit">
        <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="toolbar-right">
      <button class="tool-btn" id="size-down-btn" title="Decrease text size">
        <svg viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </button>
      <span class="size-label" id="size-label">aA</span>
      <button class="tool-btn" id="size-up-btn" title="Increase text size">
        <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </button>
      <button class="tool-btn" id="share-btn" title="Share">
        <svg viewBox="0 0 24 24"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
      </button>
      <button class="tool-btn" id="theme-btn" title="Toggle theme">
        <svg viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
      </button>
    </div>
  </div>

  <div class="quote-container" id="quote-container">
    <div class="quote-text size-3" id="quote-display"></div>
  </div>

  <div class="bottom-bar">
    <button class="bottom-btn" id="reset-btn">Reveal All</button>
    <span class="counter" id="counter"></span>
    <button class="bottom-btn" id="hide-random-btn">Hide Next</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
(function() {
  const entryScreen = document.getElementById('entry-screen');
  const practiceScreen = document.getElementById('practice-screen');
  const quoteInput = document.getElementById('quote-input');
  const beginBtn = document.getElementById('begin-btn');
  const exampleBtn = document.getElementById('example-btn');
  const exitBtn = document.getElementById('exit-btn');
  const shareBtn = document.getElementById('share-btn');
  const themeBtn = document.getElementById('theme-btn');
  const sizeUpBtn = document.getElementById('size-up-btn');
  const sizeDownBtn = document.getElementById('size-down-btn');
  const sizeLabel = document.getElementById('size-label');
  const quoteDisplay = document.getElementById('quote-display');
  const quoteContainer = document.getElementById('quote-container');
  const resetBtn = document.getElementById('reset-btn');
  const hideRandomBtn = document.getElementById('hide-random-btn');
  const counter = document.getElementById('counter');
  const toast = document.getElementById('toast');

  let words = [];
  let hiddenCount = 0;
  let totalWords = 0;
  let currentSize = 3;
  const minSize = 1;
  const maxSize = 7;
  const themes = ['light', 'sepia', 'dark'];
  let themeIndex = 0;
  let effectCleanup = null;
  let toastTimer = null;

  // Example quotes from the Ruhi Institute books
  const exampleQuotes = [
    "The betterment of the world can be accomplished through pure and goodly deeds, through commendable and seemly conduct.",
    "So powerful is the light of unity that it can illuminate the whole earth.",
    "Let your vision be world-embracing, rather than confined to your own self.",
    "The earth is but one country, and mankind its citizens.",
    "Regard man as a mine rich in gems of inestimable value. Education can, alone, cause it to reveal its treasures, and enable mankind to benefit therefrom.",
    "Be generous in prosperity, and thankful in adversity. Be worthy of the trust of thy neighbor, and look upon him with a bright and friendly face.",
    "The best beloved of all things in My sight is Justice; turn not away therefrom if thou desirest Me, and neglect it not that I may confide in thee.",
    "Noble have I created thee, yet thou hast abased thyself. Rise then unto that for which thou wast created.",
    "O Son of Spirit! My first counsel is this: Possess a pure, kindly and radiant heart, that thine may be a sovereignty ancient, imperishable and everlasting.",
    "It is not for him to pride himself who loveth his own country, but rather for him who loveth the whole world.",
    "Ye are the fruits of one tree, and the leaves of one branch. Deal ye one with another with the utmost love and harmony, with friendliness and fellowship.",
    "Think not the secrets of hearts are hidden, nay, know ye of a certainty that in clear characters they are engraved and are openly manifest in the holy Presence.",
  ];

  let exampleDeck = [];

  function shuffleArray(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  function nextExample() {
    if (exampleDeck.length === 0) exampleDeck = shuffleArray([...exampleQuotes]);
    return exampleDeck.pop();
  }

  // Shuffle deck for easter eggs
  let effectDeck = [];
  const effectFns = [effectGravity, effectWavy, effectLetterDrop, effectTrippy, effectBlur];

  function nextEffect() {
    if (effectDeck.length === 0) effectDeck = shuffleArray([...effectFns]);
    return effectDeck.pop();
  }

  // URL sharing: Brotli quality 11 via brotli-wasm, fallback to plain encoding
  var brotliReady = null;
  function loadBrotli() {
    if (brotliReady) return brotliReady;
    brotliReady = import('https://cdn.jsdelivr.net/npm/brotli-wasm@3.0.1/index.web.js').then(function(mod) {
      return mod.default();
    });
    return brotliReady;
  }

  function encodeQuote(text) {
    var bytes = new TextEncoder().encode(text);
    return loadBrotli().then(function(brotli) {
      var compressed = brotli.compress(bytes, { quality: 11 });
      return 'b=' + btoa(String.fromCharCode.apply(null, compressed)).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
    }).catch(function() {
      return 'q=' + encodeURIComponent(text);
    });
  }

  function decodeQuote(params) {
    var b = params.get('b');
    var c = params.get('c');
    var q = params.get('q');
    if (b) {
      return loadBrotli().then(function(brotli) {
        var raw = b.replace(/-/g, '+').replace(/_/g, '/');
        while (raw.length % 4) raw += '=';
        var binary = atob(raw);
        var bytes = new Uint8Array(binary.length);
        for (var i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
        return new TextDecoder().decode(brotli.decompress(bytes));
      }).catch(function() { return null; });
    }
    // Legacy deflate-raw support for old shared links
    if (c) {
      try {
        var raw = c.replace(/-/g, '+').replace(/_/g, '/');
        while (raw.length % 4) raw += '=';
        var binary = atob(raw);
        var bytes = new Uint8Array(binary.length);
        for (var i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
        if (typeof DecompressionStream !== 'undefined') {
          var ds = new DecompressionStream('deflate-raw');
          var writer = ds.writable.getWriter();
          writer.write(bytes);
          writer.close();
          return new Response(ds.readable).text();
        }
      } catch(e) {}
    }
    if (q) return Promise.resolve(decodeURIComponent(q));
    return Promise.resolve(null);
  }

  // Show toast notification
  function showToast(msg) {
    clearTimeout(toastTimer);
    toast.textContent = msg;
    toast.classList.add('visible');
    toastTimer = setTimeout(function() { toast.classList.remove('visible'); }, 2200);
  }

  // ---- Event listeners ----

  quoteInput.addEventListener('input', function() {
    var hasText = this.value.trim().length > 0;
    beginBtn.disabled = !hasText;
    exampleBtn.disabled = hasText;
  });

  quoteInput.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && e.metaKey && this.value.trim()) startPractice();
  });

  exampleBtn.addEventListener('click', function() {
    if (quoteInput.value.trim()) return;
    quoteInput.value = nextExample();
    quoteInput.dispatchEvent(new Event('input'));
  });

  beginBtn.addEventListener('click', startPractice);
  exitBtn.addEventListener('click', exitPractice);
  shareBtn.addEventListener('click', shareQuote);
  themeBtn.addEventListener('click', function(e) {
    if (e.altKey) triggerEasterEgg();
    else cycleTheme();
  });
  sizeUpBtn.addEventListener('click', function() { adjustSize(1); });
  sizeDownBtn.addEventListener('click', function() { adjustSize(-1); });
  resetBtn.addEventListener('click', revealAll);
  hideRandomBtn.addEventListener('click', hideRandom);

  function bestSizeForLength(charCount) {
    if (charCount > 600) return 1;
    if (charCount > 400) return 2;
    if (charCount > 250) return 3;
    if (charCount > 140) return 4;
    if (charCount > 60)  return 5;
    if (charCount > 25)  return 6;
    return 7;
  }

  function startPractice() {
    var text = quoteInput.value.trim();
    if (!text) return;

    cleanupEffect();
    quoteDisplay.innerHTML = '';
    quoteDisplay.style.filter = '';
    words = [];
    hiddenCount = 0;

    var tokens = text.split(/(\s+)/);
    tokens.forEach(function(token) {
      if (/^\s+$/.test(token)) {
        if (token.indexOf('\n') !== -1) {
          quoteDisplay.appendChild(document.createElement('br'));
        } else {
          quoteDisplay.appendChild(document.createTextNode(' '));
        }
      } else {
        var span = document.createElement('span');
        span.className = 'word';
        span.textContent = token;
        span.addEventListener('click', function() { toggleWord(span); });
        quoteDisplay.appendChild(span);
        words.push(span);
      }
    });

    totalWords = words.length;
    currentSize = bestSizeForLength(text.length);
    updateCounter();
    applySize();

    // Put the quote in the URL and update meta tags for sharing
    updateMetaTags(text);
    encodeQuote(text).then(function(param) {
      if (history.replaceState) {
        history.replaceState(null, '', location.pathname + '?' + param);
      }
    });

    entryScreen.style.display = 'none';
    practiceScreen.style.display = 'flex';
  }

  function toggleWord(span) {
    if (span.classList.contains('hidden')) return;
    span.classList.add('hidden');
    hiddenCount++;
    updateCounter();
  }

  function hideRandom() {
    var visible = words.filter(function(w) { return !w.classList.contains('hidden'); });
    if (visible.length === 0) return;
    var pick = visible[Math.floor(Math.random() * visible.length)];
    pick.classList.add('hidden');
    hiddenCount++;
    updateCounter();
  }

  function revealAll() {
    words.forEach(function(w) { w.classList.remove('hidden'); });
    hiddenCount = 0;
    updateCounter();
  }

  function updateCounter() {
    counter.textContent = hiddenCount + ' / ' + totalWords + ' Hidden';
  }

  function exitPractice() {
    cleanupEffect();
    // Clear the quote from the URL and reset meta tags
    if (history.replaceState) {
      history.replaceState(null, '', location.pathname);
    }
    document.title = 'Memorize';
    var defaultDesc = 'A minimal memorization tool. Hide words one by one until you can recite from memory.';
    var tags = {
      'description': defaultDesc,
      'og:title': 'Memorize',
      'og:description': defaultDesc,
      'twitter:title': 'Memorize',
      'twitter:description': defaultDesc,
    };
    Object.keys(tags).forEach(function(key) {
      var el = document.querySelector('meta[property="' + key + '"], meta[name="' + key + '"]');
      if (el) el.setAttribute('content', tags[key]);
    });
    practiceScreen.style.display = 'none';
    entryScreen.style.display = 'flex';
  }

  function shareQuote() {
    var url = location.href;
    var text = quoteInput.value.trim();
    var snippet = text.length > 120 ? text.slice(0, 120) + '...' : text;
    if (navigator.share) {
      navigator.share({ title: 'Memorize: "' + snippet + '"', text: text, url: url }).catch(function() {});
    } else if (navigator.clipboard) {
      navigator.clipboard.writeText(url).then(function() {
        // Show checkmark on the share button
        var original = shareBtn.innerHTML;
        shareBtn.innerHTML = '<svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>';
        shareBtn.style.color = 'var(--text)';
        setTimeout(function() {
          shareBtn.innerHTML = original;
          shareBtn.style.color = '';
        }, 1800);
        showToast('Link copied');
      });
    }
  }

  function cycleTheme() {
    themeIndex = (themeIndex + 1) % themes.length;
    document.documentElement.setAttribute('data-theme', themes[themeIndex]);
  }

  function adjustSize(delta) {
    currentSize = Math.max(minSize, Math.min(maxSize, currentSize + delta));
    applySize();
  }

  function applySize() {
    for (var i = minSize; i <= maxSize; i++) quoteDisplay.classList.remove('size-' + i);
    quoteDisplay.classList.add('size-' + currentSize);
    sizeLabel.textContent = 'aA';
  }

  // ---- Easter Eggs ----

  function cleanupEffect() {
    if (effectCleanup) { effectCleanup(); effectCleanup = null; }
  }

  function triggerEasterEgg() {
    cleanupEffect();
    nextEffect()();
  }

  function effectGravity() {
    var containerRect = quoteContainer.getBoundingClientRect();
    var bodies = [];

    words.forEach(function(w, i) {
      var rect = w.getBoundingClientRect();
      bodies.push({
        el: w, startY: rect.top,
        floor: containerRect.bottom - rect.height - 8,
        vy: 0, y: 0,
        bounce: 0.35 + Math.random() * 0.25,
        settled: false,
        delay: i * 30 + Math.random() * 80,
      });
      w.style.position = 'relative';
    });

    var started = performance.now();
    var rafId;
    var gravity = 1800, dt = 1 / 60;

    function tick(now) {
      var elapsed = now - started;
      var allSettled = true;
      bodies.forEach(function(p) {
        if (p.settled) return;
        if (elapsed < p.delay) { allSettled = false; return; }
        allSettled = false;
        p.vy += gravity * dt;
        p.y += p.vy * dt;
        var maxY = p.floor - p.startY;
        if (p.y >= maxY) {
          p.y = maxY;
          p.vy = -p.vy * p.bounce;
          if (Math.abs(p.vy) < 15) { p.vy = 0; p.settled = true; }
        }
        p.el.style.transform = 'translateY(' + p.y + 'px)';
      });
      if (!allSettled) rafId = requestAnimationFrame(tick);
    }

    rafId = requestAnimationFrame(tick);

    effectCleanup = function() {
      cancelAnimationFrame(rafId);
      words.forEach(function(w) { w.style.position = ''; w.style.transform = ''; });
    };
  }

  function effectWavy() {
    words.forEach(function(w) {
      w.classList.add('wavy');
      var dur = 2.5 + Math.random() * 2.5;
      var delay = Math.random() * dur;
      w.style.setProperty('--swim-dur', dur + 's');
      w.style.setProperty('--swim-delay', '-' + delay + 's');
    });

    effectCleanup = function() {
      words.forEach(function(w) {
        w.classList.remove('wavy');
        w.style.removeProperty('--swim-dur');
        w.style.removeProperty('--swim-delay');
      });
    };
  }

  function effectLetterDrop() {
    var containerRect = quoteContainer.getBoundingClientRect();
    var allLetters = [];

    words.forEach(function(w) {
      var text = w.textContent;
      w.textContent = '';
      for (var i = 0; i < text.length; i++) {
        var ls = document.createElement('span');
        ls.textContent = text[i];
        ls.style.display = 'inline-block';
        ls.style.position = 'relative';
        w.appendChild(ls);
        allLetters.push({ el: ls });
      }
    });

    var remaining = allLetters.slice();
    var interval = 600;
    var timerId, rafId;
    var gravity = 2200, dt = 1 / 60;
    var falling = [];

    function detachOne() {
      if (remaining.length === 0) return;
      var idx = Math.floor(Math.random() * remaining.length);
      var letter = remaining.splice(idx, 1)[0];
      var rect = letter.el.getBoundingClientRect();
      falling.push({
        el: letter.el, y: 0, startY: rect.top,
        floor: containerRect.bottom - rect.height - 4,
        vy: -(50 + Math.random() * 100),
        vx: (Math.random() - 0.5) * 120,
        x: 0,
        bounce: 0.25 + Math.random() * 0.3,
        friction: 0.92 + Math.random() * 0.06,
        settled: false,
      });
      interval = Math.max(25, interval * 0.87);
      if (remaining.length > 0) timerId = setTimeout(detachOne, interval);
    }

    function tick() {
      var anyActive = false;
      falling.forEach(function(p) {
        if (p.settled) return;
        anyActive = true;
        p.vy += gravity * dt;
        p.y += p.vy * dt;
        p.x += p.vx * dt;
        p.vx *= p.friction;
        var maxY = p.floor - p.startY;
        if (p.y >= maxY) {
          p.y = maxY;
          p.vy = -p.vy * p.bounce;
          p.vx *= 0.8;
          if (Math.abs(p.vy) < 12 && p.y >= maxY - 1) {
            p.vy = 0; p.settled = true;
          }
        }
        p.el.style.transform = 'translate(' + p.x.toFixed(1) + 'px,' + p.y.toFixed(1) + 'px)';
        if (p.settled) p.el.style.opacity = '0';
      });
      if (anyActive || remaining.length > 0) rafId = requestAnimationFrame(tick);
    }

    timerId = setTimeout(detachOne, interval);
    rafId = requestAnimationFrame(tick);

    effectCleanup = function() {
      clearTimeout(timerId);
      cancelAnimationFrame(rafId);
      words.forEach(function(w) {
        var text = Array.from(w.querySelectorAll('span')).map(function(s) { return s.textContent; }).join('');
        w.textContent = text;
      });
    };
  }

  function effectTrippy() {
    var hue = 0, rafId;
    words.forEach(function(w, i) { w._hueOffset = (i / words.length) * 360; });

    function tick() {
      hue = (hue + 1.5) % 360;
      words.forEach(function(w) {
        w.style.color = 'hsl(' + ((hue + w._hueOffset) % 360) + ', 75%, 55%)';
      });
      rafId = requestAnimationFrame(tick);
    }

    rafId = requestAnimationFrame(tick);

    effectCleanup = function() {
      cancelAnimationFrame(rafId);
      words.forEach(function(w) { w.style.color = ''; delete w._hueOffset; });
    };
  }

  function effectBlur() {
    var blur = 0;
    var intervalId = setInterval(function() {
      blur += 0.12;
      quoteDisplay.style.filter = 'blur(' + blur + 'px)';
      if (blur > 20) clearInterval(intervalId);
    }, 50);

    effectCleanup = function() {
      clearInterval(intervalId);
      quoteDisplay.style.filter = '';
    };
  }

  function updateMetaTags(text) {
    var snippet = text.length > 200 ? text.slice(0, 200) + '...' : text;
    var desc = '"' + snippet + '" -- Memorize this passage word by word.';
    var title = 'Memorize: "' + (text.length > 60 ? text.slice(0, 60) + '...' : text) + '"';
    document.title = title;
    var tags = {
      'description': desc,
      'og:title': title,
      'og:description': desc,
      'twitter:title': title,
      'twitter:description': desc,
    };
    Object.keys(tags).forEach(function(key) {
      var el = document.querySelector('meta[property="' + key + '"], meta[name="' + key + '"]');
      if (el) el.setAttribute('content', tags[key]);
    });
  }

  // ---- Load shared quote from URL ----
  (function loadFromURL() {
    var params = new URLSearchParams(location.search);
    if (!params.has('q') && !params.has('c') && !params.has('b')) return;
    decodeQuote(params).then(function(text) {
      if (!text) return;
      quoteInput.value = text;
      quoteInput.dispatchEvent(new Event('input'));
      updateMetaTags(text);
      startPractice();
    });
  })();

})();
</script>
